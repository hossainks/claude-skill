name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  playwright:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: eventhub
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping" --health-interval=10s
          --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm install
          npm install --prefix backend
          npm install --prefix frontend

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Configure environment
        run: |
          printf 'DATABASE_URL="mysql://root:rootpassword@127.0.0.1:3306/eventhub"\nPORT=3001\nCORS_ORIGIN="http://localhost:3000"\nJWT_SECRET="ci-test-secret"\nSHOW_EXPLORE_LINKS=false\n' > backend/.env
          echo 'NEXT_PUBLIC_API_URL=http://localhost:3001/api' > frontend/.env.local

      - name: Set up database
        run: |
          npm run db:push
          npm run seed

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Start backend
        run: |
          npm start --prefix backend &
          # Wait for Express to serve HTTP (not just TCP port open)
          npx wait-on http-get://localhost:3001/api/docs --timeout 30000

      - name: Create test user
        run: |
          STATUS=$(curl -s -o /tmp/reg.json -w "%{http_code}" \
            -X POST http://localhost:3001/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@test.com","password":"TestXacfub123%"}')
          echo "Registration HTTP $STATUS: $(cat /tmp/reg.json)"
          # 201 = created, 409 = already exists — both are fine
          [ "$STATUS" = "201" ] || [ "$STATUS" = "409" ] || \
            (echo "ERROR: unexpected registration status $STATUS" && exit 1)

      - name: Start frontend
        run: |
          npm start --prefix frontend &
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results (screenshots & videos)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7
